<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <!-- MELHORIA PARA IPHONE -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Medicamentos de Uso Contínuo (MUC)">
    <link rel="apple-touch-icon" href="Remedio dia.png.jpg">
    <meta charset="UTF-8">
    <title>Medicamentos de Uso Contínuo (MUC)</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 20px;
            background-color: #ffffff;
        }
        h1 {
            text-align: center;
            color: #007bff;
            font-size: 28px;
        }
        .subtitle {
            text-align: center;
            font-size: 19px;
            color: #555;
            margin-bottom: 25px;
        }
        .logo-top, .logo-bottom {
            text-align: center;
            margin: 15px 0;
        }
        .logo-top img {
            max-height: 150px;
            background: transparent;
        }
        .logo-bottom img {
            max-height: 95px;      /* ← reduzido conforme pedido */
            background: transparent;
        }
        .image-container {
            border: 1px solid #ccc;
            padding: 15px;
            margin-bottom: 20px;
            width: 100%; 
            box-sizing: border-box;
            text-align: center;
            background: white;
            border-radius: 10px;
        }
        .image-container img {
            width: 100%;
            height: auto;
            display: block;
            margin: 10px auto;
            border-radius: 8px;
        }
        button {
            padding: 14px 20px;
            background-color: #007bff;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 17px;
            width: 100%;
            margin: 8px 0;
        }
        button:hover {
            background-color: #0056b3;
        }
        .delete-image-button {
            background-color: #dc3545;
        }
        .delete-image-button:hover {
            background-color: #c82333;
        }
    </style>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#007bff">
</head>
<body>

    <!-- LOGO SUPERIOR (novo nome com fundo transparente) -->
    <div class="logo-top">
        <img src="Design_sem_nome.png-removebg-preview.png" alt="Logo Topo">
    </div>

    <h1>Medicamentos de Uso Contínuo (MUC)</h1>
    <p class="subtitle">📸 Tire foto da receita ou da caixa<br><strong>Guarde aqui seus medicamentos de uso contínuo (MUC)</strong></p>

    <div id="uploadSection">
        <!-- Fotos aparecem aqui -->
    </div>

    <!-- LOGO INFERIOR (clínica Geriatria - reduzido) -->
    <div class="logo-bottom">
        <img src="Logo.png" alt="Logo Rodapé">
    </div>

    <script>
        let db = null;
        const DB_NAME = "MUC_DB";
        const DB_VERSION = 1;

        function openDatabase() {
          const request = indexedDB.open(DB_NAME, DB_VERSION);
          request.onupgradeneeded = function(e) {
            db = e.target.result;
            if (!db.objectStoreNames.contains("imagens")) {
              db.createObjectStore("imagens", { keyPath: "id", autoIncrement: true });
            }
          };
          request.onsuccess = function(e) {
            db = e.target.result;
            loadImages();
            addNewUploadField();
          };
        }

        function saveImageToDB(base64Str) {
          const transaction = db.transaction(["imagens"], "readwrite");
          const store = transaction.objectStore("imagens");
          const today = new Date();
          store.add({ imagemBase64: base64Str, data: today.toISOString() });
        }

        function loadImages() {
          const transaction = db.transaction(["imagens"], "readonly");
          const store = transaction.objectStore("imagens");
          const request = store.openCursor();
          request.onsuccess = function(e) {
            const cursor = e.target.result;
            if (cursor) {
              createImageContainer(cursor.value.id, cursor.value.imagemBase64, cursor.value.data);
              cursor.continue();
            }
          };
        }

        function createImageContainer(idDB, base64, dateString) {
          const section = document.getElementById("uploadSection");
          const container = document.createElement("div");
          container.className = "image-container";
          container.id = `container-${idDB}`;

          const dateLabel = document.createElement("span");
          dateLabel.style.display = "block";
          dateLabel.style.textAlign = "center";
          dateLabel.style.fontWeight = "bold";
          dateLabel.style.color = "#007bff";
          dateLabel.textContent = `📅 ${new Date(dateString).toLocaleDateString('pt-BR')}`;

          const img = document.createElement("img");
          img.src = base64;

          const deleteBtn = document.createElement("button");
          deleteBtn.className = "delete-image-button";
          deleteBtn.textContent = "🗑️ Excluir Foto";
          deleteBtn.onclick = () => deleteImageFromDB(idDB, container);

          container.appendChild(dateLabel);
          container.appendChild(img);
          container.appendChild(deleteBtn);
          section.appendChild(container);
        }

        function deleteImageFromDB(idDB, element) {
          const transaction = db.transaction(["imagens"], "readwrite");
          const store = transaction.objectStore("imagens");
          store.delete(idDB);
          element.remove();
        }

        function addNewUploadField() {
          const section = document.getElementById("uploadSection");
          const container = document.createElement("div");
          container.className = "image-container";

          const fileWrapper = document.createElement("div");
          fileWrapper.style.textAlign = "center";

          const input = document.createElement("input");
          input.type = "file";
          input.accept = "image/*";
          input.capture = "environment";
          input.style.display = "none";

          const btn = document.createElement("button");
          btn.textContent = "📷 Tirar Foto da Receita";
          btn.onclick = () => input.click();

          input.onchange = function() {
            const file = this.files[0];
            if (file) {
              const reader = new FileReader();
              reader.onload = function(e) {
                const base64 = e.target.result;
                saveImageToDB(base64);
                createImageContainer(Date.now(), base64, new Date().toISOString());
                addNewUploadField();
                container.remove();
              };
              reader.readAsDataURL(file);
            }
          };

          fileWrapper.appendChild(input);
          fileWrapper.appendChild(btn);
          container.appendChild(fileWrapper);
          section.appendChild(container);
        }

        window.addEventListener('load', () => {
          openDatabase();
        });
    </script>
</body>
</html>
